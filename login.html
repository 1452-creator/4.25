<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能回智测平台 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: {
                            dark: '#050A1F',
                            darker: '#030818',
                            primary: '#165DFF',
                            light: '#4D88FF',
                            neon: '#00E5FF',
                            neonGreen: '#00FFAA',
                            neonYellow: '#FFE500',
                            neonRed: '#FF3A3A',
                            gray: '#121A2F',
                            lightGray: '#94A3B8',
                            midGray: '#2D3748'
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    keyframes: {
                        floatUp: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' }
                        },
                        pulseGlow: {
                            '0%, 100%': { 'box-shadow': '0 0 15px rgba(22,93,255,0.4)' },
                            '50%': { 'box-shadow': '0 0 25px rgba(0,229,255,0.6)' }
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(-20px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        },
                        gradientMove: {
                            '0%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                            '100%': { 'background-position': '0% 50%' }
                        },
                        carMove: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    },
                    animation: {
                        floatUp: 'floatUp 4s ease-in-out infinite',
                        pulseGlow: 'pulseGlow 3s ease-in-out infinite',
                        slideIn: 'slideIn 0.6s ease-out',
                        gradientMove: 'gradientMove 8s ease infinite',
                        carMove: 'carMove 20s linear infinite'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
            .animate-float { animation: float 6s ease-in-out infinite; }
            .animate-line { animation: lineMove 4s linear infinite; }
            .animate-data-flow { animation: dataFlow 2s linear infinite; }
            .animate-gradient { animation: gradientShift 8s ease infinite; }
            .bg-grid { background-image: radial-gradient(rgba(22,93,255,0.1) 1px, transparent 1px); background-size: 30px 30px; }
            .bg-grid-fine { background-image: radial-gradient(rgba(0,229,255,0.05) 1px, transparent 1px); background-size: 15px 15px; }
            .glow { box-shadow: 0 0 20px rgba(22,93,255,0.3); }
            .glow-neon { box-shadow: 0 0 15px rgba(0,229,255,0.5); }
            .text-shadow { text-shadow: 0 0 10px rgba(0,229,255,0.8); }
            .text-shadow-sm { text-shadow: 0 0 5px rgba(0,229,255,0.5); }
            .backdrop-blur-xs { backdrop-filter: blur(2px); }
            .card-hover { transition: all 0.3s ease; }
            .card-hover:hover { transform: translateY(-4px); box-shadow: 0 0 25px rgba(0,229,255,0.4); }
            .btn-hover { transition: all 0.2s ease; }
            .btn-hover:hover { transform: scale(1.05); }
        }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes lineMove {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        @keyframes dataFlow {
            0% { background-position: 0 0; }
            100% { background-position: 100px 0; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0,229,255,0.3);
            border-radius: 50%;
            animation: particleFloat 8s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(18, 26, 47, 0.8);
            border: 1px solid rgba(22, 93, 255, 0.3);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        .form-input {
            background: rgba(5, 10, 31, 0.6);
            border: 1px solid rgba(22, 93, 255, 0.3);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .tab-active {
            border-bottom: 2px solid #00E5FF;
            color: #00E5FF;
        }
    </style>
</head>

<body class="font-inter text-white m-0 p-0 min-h-screen overflow-hidden relative">
    <!-- 动态粒子背景 -->
    <div id="particles" class="fixed inset-0 z-0 pointer-events-none"></div>

    <!-- 登录容器 -->
    <div class="fixed right-10 top-1/2 transform -translate-y-1/2 z-20">
        <div class="login-card rounded-2xl p-8 max-w-md w-full animate-slideIn">
            <!--  login tabs -->
            <div class="flex border-b border-tech-primary/30 mb-6">
                <button id="client-tab" class="flex-1 py-3 text-center text-sm font-medium tab-active transition-colors">
                    <i class="fa fa-building mr-1"></i>客户登录
                </button>
                <button id="admin-tab" class="flex-1 py-3 text-center text-sm font-medium text-tech-lightGray hover:text-white transition-colors">
                    <i class="fa fa-user-circle mr-1"></i>管理员登录
                </button>
            </div>

            <!--  login form -->
            <form id="login-form" class="space-y-4">
                <!--  username field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-tech-lightGray mb-1">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-user text-tech-lightGray"></i>
                        </div>
                        <input type="text" id="username" name="username" 
                               class="form-input block w-full pl-10 pr-3 py-3 rounded-lg text-white placeholder-tech-lightGray/50 focus:outline-none focus:ring-2 focus:ring-tech-neon"
                               placeholder="请输入用户名">
                    </div>
                </div>

                <!--  password field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-tech-lightGray mb-1">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-tech-lightGray"></i>
                        </div>
                        <input type="password" id="password" name="password" 
                               class="form-input block w-full pl-10 pr-10 py-3 rounded-lg text-white placeholder-tech-lightGray/50 focus:outline-none focus:ring-2 focus:ring-tech-neon"
                               placeholder="请输入密码">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <button type="button" id="toggle-password" class="text-tech-lightGray hover:text-white">
                                <i class="fa fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!--  remember me and forgot password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 rounded border-tech-primary/30 bg-tech-darker text-tech-neon focus:ring-tech-neon cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-tech-lightGray cursor-pointer">
                            记住我
                        </label>
                    </div>
                    <div class="text-sm">
                        <a href="#" id="forgot-password" class="font-medium text-tech-neon hover:text-tech-light transition-colors cursor-pointer">
                            忘记密码?
                        </a>
                    </div>
                </div>

                <!--  login button -->
                <div>
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-tech-primary to-tech-neon hover:from-tech-light hover:to-tech-neon focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-tech-neon btn-hover animate-pulseGlow">
                        <i class="fa fa-sign-in mr-2"></i>登录
                    </button>
                </div>
            </form>

            <!--  system status -->
            <div class="mt-6 text-center">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-tech-green/10 border border-tech-neonGreen/30">
                    <div class="w-2 h-2 bg-tech-neonGreen rounded-full animate-pulse"></div>
                    <span class="text-xs text-tech-neonGreen">系统运行中</span>
                </div>
            </div>

            <!--  copyright -->
            <div class="mt-8 text-center text-xs text-tech-lightGray">
                能回智测平台 © 2026 新能源汽车电驱系统能量回馈型测试平台
            </div>
        </div>
    </div>

    <script>
        // create particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for(let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(particle);
            }
        }

        // toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleButton = document.getElementById('toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleButton.innerHTML = '<i class="fa fa-eye-slash"></i>';
            } else {
                passwordInput.type = 'password';
                toggleButton.innerHTML = '<i class="fa fa-eye"></i>';
            }
        }

        // 加载保存的登录信息
        function loadSavedCredentials(isClient) {
            const key = isClient ? 'client_credentials' : 'admin_credentials';
            const saved = localStorage.getItem(key);
            if (saved) {
                const credentials = JSON.parse(saved);
                document.getElementById('username').value = credentials.username;
                document.getElementById('password').value = credentials.password;
                document.getElementById('remember-me').checked = true;
            } else {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('remember-me').checked = false;
            }
        }

        // tab switching
        function setupTabs() {
            const adminTab = document.getElementById('admin-tab');
            const clientTab = document.getElementById('client-tab');
            
            adminTab.addEventListener('click', () => {
                adminTab.classList.add('tab-active');
                adminTab.classList.remove('text-tech-lightGray');
                clientTab.classList.remove('tab-active');
                clientTab.classList.add('text-tech-lightGray');
                loadSavedCredentials(false);
            });
            
            clientTab.addEventListener('click', () => {
                clientTab.classList.add('tab-active');
                clientTab.classList.remove('text-tech-lightGray');
                adminTab.classList.remove('tab-active');
                adminTab.classList.add('text-tech-lightGray');
                loadSavedCredentials(true);
            });
        }

        // form submission
        function setupFormSubmission() {
            const loginForm = document.getElementById('login-form');
            const adminTab = document.getElementById('admin-tab');
            
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const rememberMe = document.getElementById('remember-me').checked;
                const isAdmin = adminTab.classList.contains('tab-active');
                
                // simple validation
                if (!username || !password) {
                    alert('请输入用户名和密码');
                    return;
                }
                
                // 验证账号密码
                let isValid = false;
                if (isAdmin) {
                    // 管理员账号验证
                    if (username === '18335050524' && password === '123456') {
                        isValid = true;
                    }
                } else {
                    // 客户端账号验证
                    const clientUsernames = ['15702770259', '19948276026', '15525643206', '15702770417'];
                    if (clientUsernames.includes(username) && password === '123456') {
                        isValid = true;
                    }
                }
                
                if (!isValid) {
                    alert('用户名或密码错误');
                    return;
                }
                
                // 保存登录信息
                if (rememberMe) {
                    const key = isAdmin ? 'admin_credentials' : 'client_credentials';
                    localStorage.setItem(key, JSON.stringify({ username, password }));
                } else {
                    // 清除保存的登录信息
                    const key = isAdmin ? 'admin_credentials' : 'client_credentials';
                    localStorage.removeItem(key);
                }
                
                // 登录成功
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userType', isAdmin ? 'admin' : 'client');
                localStorage.setItem('username', username);
                
                // redirect to main page after login
                window.location.href = 'index.html';
            });
        }

        // 显示消息框
        function showMessage(title, message, type = 'info') {
            // 创建消息框元素
            const messageBox = document.createElement('div');
            messageBox.className = 'fixed top-4 right-4 z-50 bg-tech-gray border border-tech-primary rounded-lg p-4 shadow-lg animate-slideIn';
            messageBox.style.maxWidth = '300px';
            
            // 设置消息框内容
            messageBox.innerHTML = `
                <div class="flex items-start">
                    <div class="flex-shrink-0">
                        <i class="fa ${type === 'success' ? 'fa-check-circle text-tech-neonGreen' : type === 'error' ? 'fa-exclamation-circle text-tech-neonRed' : 'fa-info-circle text-tech-neon'}" style="font-size: 1.5rem;"></i>
                    </div>
                    <div class="ml-3 flex-1">
                        <h3 class="text-sm font-medium text-white">${title}</h3>
                        <div class="mt-1 text-sm text-tech-lightGray">${message}</div>
                    </div>
                    <button type="button" class="ml-4 flex-shrink-0 text-tech-lightGray hover:text-white close-message">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            `;
            
            // 添加到页面
            document.body.appendChild(messageBox);
            
            // 添加关闭按钮事件
            messageBox.querySelector('.close-message').addEventListener('click', () => {
                messageBox.style.opacity = '0';
                messageBox.style.transform = 'translateX(100%)';
                messageBox.style.transition = 'all 0.3s ease';
                setTimeout(() => messageBox.remove(), 300);
            });
            
            // 3秒后自动关闭
            setTimeout(() => {
                messageBox.style.opacity = '0';
                messageBox.style.transform = 'translateX(100%)';
                messageBox.style.transition = 'all 0.3s ease';
                setTimeout(() => messageBox.remove(), 300);
            }, 3000);
        }

        // 为按键添加功能
        function setupButtonFunctions() {
            // 忘记密码功能
            const forgotPassword = document.getElementById('forgot-password');
            if (forgotPassword) {
                forgotPassword.addEventListener('click', (e) => {
                    e.preventDefault();
                    showMessage('忘记密码', '请联系系统管理员重置密码', 'info');
                });
            }
            
            // 系统状态功能
            const systemStatus = document.querySelector('.bg-tech-green\/10');
            if (systemStatus) {
                systemStatus.addEventListener('click', () => {
                    showMessage('系统状态', '系统运行正常，所有服务可用', 'success');
                });
            }
            
            // 用户名输入框焦点效果
            const usernameInput = document.getElementById('username');
            if (usernameInput) {
                usernameInput.addEventListener('focus', () => {
                    showMessage('提示', '请输入您的账号', 'info');
                });
            }
            
            // 密码输入框焦点效果
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.addEventListener('focus', () => {
                    showMessage('提示', '请输入您的密码', 'info');
                });
            }
            
            // 登录按钮悬停效果
            const loginButton = document.querySelector('button[type="submit"]');
            if (loginButton) {
                loginButton.addEventListener('mouseenter', () => {
                    loginButton.classList.add('scale-105');
                });
                loginButton.addEventListener('mouseleave', () => {
                    loginButton.classList.remove('scale-105');
                });
            }
        }

        // initialize
        window.addEventListener('load', () => {
            createParticles();
            setupTabs();
            setupFormSubmission();
            document.getElementById('toggle-password').addEventListener('click', togglePassword);
            setupButtonFunctions();
            // 加载客户端的保存信息
            loadSavedCredentials(true);
            
            // 显示欢迎消息
            setTimeout(() => {
                showMessage('欢迎', '欢迎使用能回智测平台', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
